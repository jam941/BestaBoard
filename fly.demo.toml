# fly.toml for bestaboard-demo — backend-only demo environment.
# Deploy with: fly deploy --config fly.demo.toml
#
# Required secrets (set via `fly secrets set --app bestaboard-demo`):
#   VBOARD_TOKEN  — Vestaboard API token
#
# No DATABASE_URL, ADMIN_USER, or ADMIN_PASSWORD needed.

app = 'bestaboard-demo'
primary_region = 'ewr'

[build]

[env]
  DEMO = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
